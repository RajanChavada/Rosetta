# Rosetta Configuration for Web Applications
# Generated template with sensible defaults for modern web apps

schema_version: "1.0.0"

project:
  name: "my-web-app"
  description: "A modern web application built with React and Node.js"
  type: "web_app"
  risk_level: "medium"

stack:
  language: "TypeScript"
  frontend:
    - "React"
    - "Next.js"
    - "Tailwind CSS"
  backend:
    - "Node.js"
    - "Express"
  datastores:
    - "PostgreSQL"
    - "Redis"
  testing:
    - "Jest"
    - "React Testing Library"
    - "Playwright"

conventions:
  - name: "TypeScript"
    rules:
      - description: "Enable strict mode"
        pattern: "tsconfig.json"
        enforced: true
      - description: "Use interfaces for object types"
        enforced: true
    examples:
      - "interface User { id: string; name: string; }"
  - name: "React"
    rules:
      - description: "Use functional components with hooks"
        enforced: true
      - description: "Components should be in PascalCase"
        pattern: "^[A-Z][a-zA-Z0-9]*$"
        enforced: true
    examples:
      - "const MyComponent: React.FC = () => { ... }"
  - name: "Git"
    rules:
      - description: "Conventional commits"
        pattern: "^((feat|fix|docs|style|refactor|test|chore)(\\(.+\\))?: [a-z0-9]+)"
        enforced: true
      - description: "Branch names should be kebab-case"
        pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
        enforced: true

commands:
  dev:
    - name: "Start dev server"
      command: "npm run dev"
      description: "Start development server with hot reload"
    - name: "Start backend"
      command: "npm run dev:api"
      description: "Start API server"
  test:
    - name: "Run all tests"
      command: "npm test"
    - name: "Run unit tests"
      command: "npm test:unit"
    - name: "Run e2e tests"
      command: "npm test:e2e"
  build:
    - name: "Build frontend"
      command: "npm run build"
    - name: "Build and lint"
      command: "npm run build && npm run lint"

agents:
  - name: "senior-architect"
    role: "Senior Software Architect"
    style: "pair_programmer"
    scope: "module"
    system_prompt: "You are a senior architect specializing in React and Node.js applications. Focus on scalable, maintainable designs."
  - name: "code-reviewer"
    role: "Code Reviewer"
    style: "conservative"
    scope: "current_file"
    system_prompt: "You are a meticulous code reviewer. Focus on bugs, security issues, and adherence to conventions."

notes:
  - title: "Authentication Flow"
    category: "domain_rule"
    content: "All API routes must validate the Authorization header using the Middleware. Unauthorized requests should return 401 without leaking information."
    priority: 9
  - title: "Database Migrations"
    category: "gotcha"
    content: "Never modify the database schema directly. Always create a migration file and run `npm run db:migrate`."
    priority: 8
  - title: "Component Organization"
    category: "optimization"
    content: "Place components in `src/components/` and hooks in `src/hooks/`. Keep files under 200 lines for maintainability."
    priority: 5
  - title: "Debugging API Issues"
    category: "debugging"
    content: "Check the API logs at `logs/api.log` first. Use the Debugger in VSCode with breakpoints in the service layer."
    priority: 7

ide_overrides:
  claude:
    persona: "Senior Full-Stack Engineer"
    additional_context: "This project uses a monorepo structure with shared types in packages/common."
  cursor:
    reasoning_modes:
      - "Performance Impact"
      - "API Contract Changes"
  windsurf:
    collaboration_mode: "pair-programming"

metadata:
  created_at: "2025-03-27T10:00:00.000Z"
  updated_at: "2025-03-27T10:00:00.000Z"
  version: "1.0.0"
